<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="SMLT - Staff Page">
    <meta name="theme-color" content="#0a0a0a">
    <title>Стафф — SMLT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body class="">
    <div id="app">

        <!-- Кнопка смены темы -->
        <button class="theme-toggle" id="themeToggle" title="Сменить тему">
            <span class="theme-icon">🌙</span>
        </button>

        <!-- Кнопка хоста -->
        <button class="host-btn host-btn-left" id="hostBtn" title="Войти как хост">
            <span>Хост</span>
        </button>

        <header class="app-header">
            <div class="header-content">
                <div class="header-brand">
                    <span class="header-logo">👥</span>
                    <div class="header-title">
                        <h1>Персонал SMLT</h1>
                        <span class="header-subtitle">Состав команды</span>
                    </div>
                </div>
                <nav class="header-nav">
                    <a href="index.html" class="nav-link">Главная</a>
                    <a href="demonlist.html" class="nav-link">Демонлист</a>
                    <a href="projects.html" class="nav-link">Проекты</a>
                    <a href="staff.html" class="nav-link active">Стафф</a>
                </nav>
            </div>
        </header>

        <main class="app-main">
            <div class="container">
                <div class="admin-panel admin-only" style="display: none;">
                    <div class="admin-panel-header">👑 Управление ролями</div>
                    <div class="admin-panel-content">
                        <div style="display: flex; gap: var(--spacing-sm); flex-wrap: wrap;">
                            <button class="btn btn-primary" data-action="show-add-role-modal">➕ Создать роль</button>
                        </div>
                    </div>
                </div>

                <section class="info-section" style="padding-top: 0;">
                    <div class="info-card" style="border-left: 3px solid var(--color-secondary);">
                        <p style="color: var(--color-text-secondary); line-height: 1.7;">
                            Здесь отображаются роли и состав персонала SMLT — администрация, модераторы и другие участники команды.
                        </p>
                    </div>
                </section>

                <div id="staffLoadingState" class="loading-state">
                    <div class="spinner"></div>
                    <div class="loading-text">Загрузка состава...</div>
                </div>

                <div id="staffRolesContainer" class="projects-grid">
                    <!-- Роли будут добавлены сюда через JS -->
                </div>
            </div>
        </main>

        <!-- Модальное окно создания роли -->
        <div id="addRoleModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">🆕 Новая роль</div>
                    <button class="modal-close" data-action="close-add-role-modal">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="roleName">Название роли:</label>
                        <input type="text" id="roleName" class="form-input" placeholder="Например: Администрация">
                    </div>
                    <div class="form-group">
                        <label for="roleColor">Цвет роли:</label>
                        <div class="role-color-picker">
                            <input type="color" id="roleColor" class="color-input" value="#3b82f6">
                            <div class="role-color-presets">
                                <span class="color-preset active" data-color="#3b82f6" style="background: #3b82f6;"></span>
                                <span class="color-preset" data-color="#ef4444" style="background: #ef4444;"></span>
                                <span class="color-preset" data-color="#22c55e" style="background: #22c55e;"></span>
                                <span class="color-preset" data-color="#eab308" style="background: #eab308;"></span>
                                <span class="color-preset" data-color="#a855f7" style="background: #a855f7;"></span>
                                <span class="color-preset" data-color="#6366f1" style="background: #6366f1;"></span>
                                <span class="color-preset" data-color="#ec4899" style="background: #ec4899;"></span>
                            </div>
                        </div>
                    </div>
                    <div style="display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-md);">
                        <button class="btn btn-secondary" data-action="close-add-role-modal">Отмена</button>
                        <button class="btn btn-primary" data-action="create-role">Создать</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальное окно добавления игрока -->
        <div id="addPlayerModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title" id="addPlayerModalTitle">👤 Добавить игрока</div>
                    <button class="modal-close" data-action="close-add-player-modal-staff">✕</button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="addPlayerRoleIndex" value="-1">
                    <div class="form-group">
                        <label for="playerNickname">Ник игрока:</label>
                        <input type="text" id="playerNickname" class="form-input" placeholder="Nickname">
                    </div>
                    <div class="form-group">
                        <label for="playerDiscord">Discord (необязательно):</label>
                        <input type="text" id="playerDiscord" class="form-input" placeholder="Username#0000 or username">
                    </div>
                    <div style="display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-md);">
                        <button class="btn btn-secondary" data-action="close-add-player-modal-staff">Отмена</button>
                        <button class="btn btn-primary" data-action="add-player-to-role">Добавить игрока</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальное окно входа хоста -->
        <div id="hostModal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">🔐 Вход хоста</div>
                    <button class="modal-close" data-action="close-host-modal">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="hostPassword">Введите пароль:</label>
                        <input type="password" id="hostPassword" class="form-input" placeholder="Пароль">
                    </div>
                    <button id="hostSubmitBtn" class="btn btn-primary" data-action="verify-host">Войти</button>
                    <div id="hostError" class="error-message" style="display: none;">Неверный пароль!</div>
                </div>
            </div>
        </div>

        <div id="toastContainer"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
