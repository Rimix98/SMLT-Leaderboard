<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="SMLT - Страница не найдена">
    <meta name="theme-color" content="#0a0a0a">
    <title>404 — SMLT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        :root {
            --color-primary: #0a0a0a;
            --color-surface: #222222;
            --color-surface-2: #2a2a2a;
            --color-border: #3a3a3a;
            --color-secondary: #4a9eff;
            --color-text-primary: #e8e8e8;
            --color-text-secondary: #a0a0a0;
        }

        [data-theme="light"] {
            --color-primary: #f5f5f5;
            --color-surface: #ffffff;
            --color-surface-2: #f0f0f0;
            --color-border: #d4d4d4;
            --color-secondary: #2563eb;
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #555555;
        }

        [data-theme="gray"] {
            --color-primary: #2a2a2a;
            --color-surface: #363636;
            --color-surface-2: #3d3d3d;
            --color-border: #555555;
            --color-secondary: #6b8cff;
            --color-text-primary: #d4d4d4;
            --color-text-secondary: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--color-primary);
            color: var(--color-text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 520px;
            width: 100%;
        }

        .code {
            font-size: 8rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, var(--color-secondary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            user-select: none;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--color-text-primary);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--color-text-secondary);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .links {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s ease;
            border: 1px solid var(--color-border);
            background: var(--color-surface);
            color: var(--color-text-primary);
        }

        .links a:hover {
            background: var(--color-surface-2);
            border-color: var(--color-secondary);
            color: var(--color-secondary);
            transform: translateY(-1px);
        }

        .links a.primary {
            background: var(--color-secondary);
            border-color: var(--color-secondary);
            color: #fff;
        }

        .links a.primary:hover {
            opacity: 0.9;
            color: #fff;
            transform: translateY(-1px);
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(135deg, var(--color-secondary), #a855f7);
            border-radius: 2px;
            margin: 0 auto 2rem;
            opacity: 0.6;
        }

        @media (max-width: 480px) {
            .code { font-size: 5rem; }
            .title { font-size: 1.25rem; }
            .subtitle { font-size: 0.875rem; }
            .links { flex-direction: column; }
            .links a { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="code">404</div>
        <div class="divider"></div>
        <h1 class="title">Страница не найдена</h1>
        <p class="subtitle">Похоже, эта страница была удалена или перемещена.</p>
        <div class="links">
            <a href="/" class="primary">Главная</a>
            <a href="/leaderboard.html">Лидерборд</a>
            <a href="/projects.html">Проекты</a>
            <a href="/staff.html">Команда</a>
        </div>
    </div>
</body>
</html>
